services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API: ${NEXT_PUBLIC_API:-http://localhost:8000}
        NEXT_PUBLIC_MOCK: ${NEXT_PUBLIC_MOCK:-false}
    image: psl-legal-ui:latest
    container_name: psl-legal-ui
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API: ${NEXT_PUBLIC_API:-http://localhost:8000}
      NEXT_PUBLIC_MOCK: ${NEXT_PUBLIC_MOCK:-false}
    restart: unless-stopped
